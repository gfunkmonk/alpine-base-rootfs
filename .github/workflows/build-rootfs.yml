name: Generate Alpine Base Rootfs

on:
  workflow_dispatch:
    inputs:
      extra_packages:
        description: 'Extra packages to bake into the rootfs (space separated)'
        required: false
        default: ''
jobs:
  generate-rootfs:
    strategy:
      matrix:
        arch: [x86_64, x86, aarch64, armv7, armhf]
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: x86
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
          - arch: armv7
            runner: ubuntu-24.04-arm
          - arch: armhf
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Install Host Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support zstd jq curl
      - name: Read Alpine version
        id: alpine-version
        run: echo "version=$(grep '^ALPINE_VERSION=' setup-base-rootfs.sh | cut -d= -f2 | tr -d '"')" >> "$GITHUB_OUTPUT"
      - name: Cache Rootfs
        uses: actions/cache@v5
        with:
          path: minirootfs/alpine-base-${{ matrix.arch }}.tar.zst
          key: alpine-prebaked-${{ steps.alpine-version.outputs.version }}-${{ matrix.arch }}
      - name: Run Rootfs Generator
        run: |
          chmod +x ./setup-base-rootfs.sh
          sudo env ARCH=${{ matrix.arch }} ./setup-base-rootfs.sh ${{ inputs.extra_packages }}
      - name: Upload Rootfs Artifact
        uses: actions/upload-artifact@v6
        with:
          name: alpine-base-${{ github.event.inputs.architecture }}
          path: minirootfs/*.tar.zst
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rootfs-${{ github.event.inputs.architecture }}-${{ github.run_id }}
          name: "Alpine Base Rootfs: ${{ github.event.inputs.architecture }}"
          files: minirootfs/*.tar.zst
          body: |
            ### Automated Alpine Base Build
            - **Arch:** ${{ github.event.inputs.architecture }}
            - **Extra Packages:** `${{ github.event.inputs.extra_packages || 'none' }}`
            - **Base Tools:** build-base, mold, ccache, patch, clang, etc.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}