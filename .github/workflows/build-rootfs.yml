name: Generate Alpine Base Rootfs

on:
  workflow_dispatch:
    inputs:
      extra_packages:
        description: 'Extra packages to bake into the rootfs (space separated)'
        required: false
        default: ''
jobs:
  generate-rootfs:
    strategy:
      matrix:
        arch: [x86_64, x86, aarch64, armv7, armhf]
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: x86
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
          - arch: armv7
            runner: ubuntu-24.04-arm
          - arch: armhf
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Install Host Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support zstd jq curl
      - name: Read Alpine version
        id: alpine-version
        run: echo "version=$(grep '^ALPINE_VERSION=' setup-base-rootfs.sh | cut -d= -f2 | tr -d '"')" >> "$GITHUB_OUTPUT"
      - name: Cache Rootfs
        uses: actions/cache@v5
        with:
          path: minirootfs/alpine-base-${{ matrix.arch }}.tar.zst
          key: alpine-prebaked-${{ steps.alpine-version.outputs.version }}-${{ matrix.arch }}
      - name: Run Rootfs Generator
        run: |
          chmod +x ./setup-base-rootfs.sh
          sudo env ARCH=${{ matrix.arch }} ./setup-base-rootfs.sh ${{ inputs.extra_packages }}
      - name: Upload Rootfs Artifact
        uses: actions/upload-artifact@v7
        with:
          name: rootfs-artifacts-${{ matrix.arch }}
          path: minirootfs/alpine-base-${{ matrix.arch }}.tar.zst
  create-release:
    needs: generate-rootfs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-rootfs
          pattern: rootfs-artifacts-*
          merge-multiple: true
      - name: Create Single Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rootfs-all-${{ github.run_id }}
          name: "Alpine Base Rootfs: All Architectures"
          make_latest: true
          files: all-rootfs/*.tar.zst
          body: |
            ### Consolidated Alpine Base Builds
            Automated multi-arch rootfs generation.

            **Included Architectures:**
            - x86_64, x86, aarch64, armv7, armhf

            **Extra Packages Baked In:**
            `${{ github.event.inputs.extra_packages || 'none' }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}